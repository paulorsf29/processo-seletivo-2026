spring.application.name=FestWear

server.port=${SERVER_PORT:8082}

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Ecomerce_DB}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# JPA - schema is owned by Flyway migrations (src/main/resources/db/migration), Hibernate only validates it matches.
# Migrations run explicitly from EcomerceApplication.main() (see FlywayRunner) because this Spring Boot build has
# no bundled Flyway auto-configuration module.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Cache (Redis) - product catalog reads are cached, invalidated on any product write
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
app.cache.products-ttl-seconds=${PRODUCTS_CACHE_TTL_SECONDS:300}

# JWT
app.jwt.secret=${JWT_SECRET:c2VjcmV0LWtleS1wYXJhLWRlc2Vudm9sdmltZW50by10cm9jYXItZW0tcHJvZHVjYW8tMTIzNDU2Nzg=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Admin padrão criado na primeira inicialização (troque a senha em produção)
app.admin.email=${ADMIN_EMAIL:admin@ecomerce.com}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Rate limiting (janela fixa por IP)
app.rate-limit.auth.capacity=5
app.rate-limit.auth.window-seconds=60
app.rate-limit.catalog.capacity=60
app.rate-limit.catalog.window-seconds=60
